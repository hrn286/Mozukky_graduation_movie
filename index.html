<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>先輩へ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card" id="step1">
      <p class="sub">Graduation Surprise</p>
      <h1>先輩へ</h1>
      <p class="message">
        ご卒業おめでとうございます！<br />
        感謝の気持ちをこめて、<br />
        ささやかなプレゼントを用意しました。
      </p>
      <button class="main-button" onclick="goStep2()">思い出を見る</button>
    </section>

    <section class="card hidden" id="step2">
      <p class="sub">Stop!その前に！</p>
      <h1>最後に先輩の一発芸が見たいな！</h1>
      <p class="message">
        一発芸、披露してくれますか？
      </p>
    
      <div class="button-group">
        <button class="sub-button" onclick="notReady()">披露しない</button>
        <button class="main-button" onclick="goStep3()">喜んで</button>
      </div>
    
      <p id="hint" class="hint hidden">披露してくれますよね？圧</p>
    </section>

    <section class="card hidden" id="step3">
      <p class="sub">Everyone!</p>
      <h1>面白かったですか？</h1>
      <p class="message">
        よっ！先輩！
      </p>
    
      <div class="button-group">
        <button class="sub-button" onclick="notReady()">いいえ</button>
        <button class="main-button" onclick="goStep4()">はい</button>
      </div>
    </section>

    <section class="card hidden" id="step4">
      <p class="sub">Oh no...辛口評価...</p>
      <h1>プライドをかけてもう一発！</h1>
      <p class="message">
      </p>
    
      <div class="button-group">
        <button class="sub-button" onclick="goStep5()">喜んで</button>
        <button class="main-button" onclick="goStep5()">喜んで</button>
      </div>
    </section>
    
    <section class="card hidden" id="step5">
      <p class="sub">そろそろ本題へ</p>
      <h1>動画を再生する</h1>
      <p class="message">
        それでは、どうぞご覧ください。
      </p>
      <button class="main-button" onclick="playVideo()">再生する</button>

      <div id="videoArea" class="video-section hidden">
        <div class="video-wrap">
          <iframe
            id="youtubeFrame"
            src=""
            title="卒業サプライズ動画"
            allow="autoplay; encrypted-media; picture-in-picture"
            allowfullscreen>
          </iframe>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
